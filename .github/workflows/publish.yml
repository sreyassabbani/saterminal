name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Confirm the tag matches the package version
        run: |
          package_version="$(node -p 'require("./package.json").version')"
          test "$GITHUB_REF_NAME" = "v$package_version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package
        run: |
          bun run typecheck
          bun test
          bun run build
          ./dist/sat --version

      - name: Verify packed CLI
        run: |
          package_version="$(node -p 'require("./package.json").version')"
          package_directory="$(mktemp -d)"
          package_tarball="$(npm pack --silent --pack-destination "$package_directory")"
          BUN_INSTALL="$package_directory/bun" bun install --global "$package_directory/$package_tarball"
          installed_version="$(PATH="$package_directory/bun/bin:$PATH" sat --version)"
          test "$installed_version" = "$package_version"

      - name: Publish
        run: npm publish
